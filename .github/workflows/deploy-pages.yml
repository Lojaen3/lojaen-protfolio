# Build Vite app and deploy to GitHub Pages.
# Repo → Settings → Pages → Build and deployment → Source: GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Opt into Node.js 24 for JS-based actions until all publish Node 24-native releases
# (see https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      # Same archive as actions/upload-pages-artifact, but upload-artifact@v6 is Node 24
      # (upload-pages-artifact@v4 still pins upload-artifact@v4.6.2 / Node 20).
      - name: Archive Pages artifact
        shell: sh
        run: |
          echo ::group::Archive artifact
          tar \
            --dereference --hard-dereference \
            --directory "$INPUT_PATH" \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .
          echo ::endgroup::
        env:
          INPUT_PATH: dist

      - uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
